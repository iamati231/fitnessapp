workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    environment:
      xcode: "16.0"
    scripts:
      - name: Build iOS app
        script: |
          set -e
          
          xcodebuild \
            -scheme FitnessApp2 \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -archivePath /tmp/FitnessApp2.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive
          
          # IPA aus Archive erstellen
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/FitnessApp2.xcarchive \
            -exportPath /tmp/FitnessApp2_export \
            -exportOptionsPlist /dev/stdin << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLIST
          
          cp /tmp/FitnessApp2_export/*.ipa $CM_BUILD_DIR/FitnessApp2.ipa
          ls -lh $CM_BUILD_DIR/FitnessApp2.ipa
    artifacts:
      - $CM_BUILD_DIR/FitnessApp2.ipa
