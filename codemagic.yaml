workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    environment:
      xcode: "16.0"
    scripts:
      - name: Build iOS app
        script: |
          xcodebuild \
            -scheme FitnessApp2 \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
            -configuration Debug \
            SWIFT_VERSION=5 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
