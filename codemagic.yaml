workflows:
  ios-unsigned:
    name: iOS Unsigned Build (for Sideloadly)
    max_build_duration: 60
    environment:
      xcode: "16.2"
    scripts:
      - name: Build for device (unsigned)
        script: |
          set -e
          xcodebuild build \
            -project FitnessApp2.xcodeproj \
            -scheme FitnessApp2 \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath /tmp/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        script: |
          set -e
          echo "=== Build products ==="
          find /tmp/DerivedData -name "*.app" | grep -v ".appex" | head -10

          APP_PATH=$(find /tmp/DerivedData -name "FitnessApp2.app" | grep -v ".appex" | head -1)
          echo "=== App path: $APP_PATH ==="
          ls -lh "$APP_PATH/"

          BINARY="$APP_PATH/FitnessApp2"
          echo "=== Binary ==="
          ls -lh "$BINARY"
          file "$BINARY"

          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/FitnessApp2.app
          cd /tmp
          zip -r "$CM_BUILD_DIR/FitnessApp2.ipa" Payload/
          echo "=== Final IPA ==="
          ls -lh "$CM_BUILD_DIR/FitnessApp2.ipa"

    artifacts:
      - $CM_BUILD_DIR/FitnessApp2.ipa
