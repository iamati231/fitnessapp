workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    environment:
      xcode: "16.0"
    scripts:
      - name: Build iOS app
        script: |
          set -e
          
          # Archive erstellen
          xcodebuild \
            -scheme FitnessApp2 \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -archivePath /tmp/FitnessApp2.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive
          
          # IPA direkt aus Archive extrahieren (ohne exportArchive)
          APP_PATH=$(find /tmp/FitnessApp2.xcarchive -name "*.app" | head -1)
          echo "APP_PATH: $APP_PATH"
          
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r $CM_BUILD_DIR/FitnessApp2.ipa Payload/
          ls -lh $CM_BUILD_DIR/FitnessApp2.ipa
    artifacts:
      - $CM_BUILD_DIR/FitnessApp2.ipa
