workflows:
  ios-unsigned:
    name: iOS Unsigned Build (for Sideloadly)
    max_build_duration: 60
    environment:
      xcode: "16.2"
    scripts:
      - name: Build & archive (unsigned)
        script: |
          set -e
          xcodebuild \
            -project FitnessApp2.xcodeproj \
            -scheme FitnessApp2 \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath /tmp/FitnessApp2.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive

      - name: Show archive contents & package IPA
        script: |
          set -e
          echo "=== Archive contents ==="
          find /tmp/FitnessApp2.xcarchive -type f | head -30

          APP_PATH=$(find /tmp/FitnessApp2.xcarchive/Products -name "*.app" | head -1)
          echo "=== App path: $APP_PATH ==="
          ls -lh "$APP_PATH"
          ls -lh "$APP_PATH/" | head -20

          BINARY="$APP_PATH/FitnessApp2"
          if [ -f "$BINARY" ]; then
            echo "=== Binary size ==="
            ls -lh "$BINARY"
            file "$BINARY"
          else
            echo "ERROR: Binary not found!"
            exit 1
          fi

          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/FitnessApp2.app
          cd /tmp
          zip -r "$CM_BUILD_DIR/FitnessApp2.ipa" Payload/
          echo "=== Final IPA ==="
          ls -lh "$CM_BUILD_DIR/FitnessApp2.ipa"

    artifacts:
      - $CM_BUILD_DIR/FitnessApp2.ipa
